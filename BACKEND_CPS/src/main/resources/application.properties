jwt.secret=${JWT_SECRET:}
jwt.expiration.ms=36000000

groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.1-8b-instant}

gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}

app.2fa.issuer=${TWO_FA_ISSUER:GCIPlus}

app.frontend.reset-password-url=${FRONTEND_RESET_URL:https://calidad-historico.vercel.app/reset-password}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://calidad-historico.vercel.app}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,https://calidad-historico.vercel.app,https://*.vercel.app}

spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:9f0a00001@smtp-brevo.com}
spring.mail.password=${MAIL_PASSWORD:}
app.mail.from=${MAIL_FROM:gestioncursosplus@gmail.com}
app.mail.from-name=${MAIL_FROM_NAME:GCI+}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

