spring.application.name=Gestion_Reservas
# 1. URL de conexión a tu base de datos en Neon
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gestion_cursos}
# 2. Credenciales exactas que me compartiste
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
# 3. Driver de PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 5. Opcional: Muestra en la consola de VS Code cómo se crean las tablas
spring.jpa.show-sql=true
spring.thymeleaf.cache=false
spring.resources.static-locations=classpath:/static/
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG

# JWT config (Base64; minimo 256 bits para HS256)
jwt.secret=${JWT_SECRET:}
jwt.expiration.ms=36000000

# IA (Groq)
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.1-8b-instant}

# Password reset
app.frontend.reset-password-url=${FRONTEND_RESET_URL:http://localhost:5173/reset-password}

# Mail config (Brevo SMTP)
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:9f0a00001@smtp-brevo.com}
spring.mail.password=${MAIL_PASSWORD:}
app.mail.from=${MAIL_FROM:gestioncursosplus@gmail.com}
app.mail.from-name=${MAIL_FROM_NAME:GCI+}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

